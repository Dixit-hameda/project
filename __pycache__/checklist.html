{% extends "base.html" %}
{% block content %}
<section class="page-section">
  <div class="container narrow">
    <div class="form-card">
      <h1>Daily Safety Checklist</h1>
      <form method="post">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Worker Name</label><input class="form-control" name="worker_name" value="{{ worker }}" required></div>
          <div class="col-md-6"><label class="form-label">Zone</label><input class="form-control" name="zone" value="{{ zone }}" required></div>
        </div>
        {% for name, label in [('ppe_checked','PPE checked'),('tools_inspected','Insulated tools inspected'),('lockout_verified','Lockout/tagout verified'),('panels_secured','Electrical panels secured')] %}
        <div class="form-check safety-check">
          <input class="form-check-input" type="checkbox" name="{{ name }}" id="{{ name }}">
          <label class="form-check-label" for="{{ name }}">{{ label }}</label>
        </div>
        {% endfor %}
        <label class="form-label mt-3">Notes</label>
        <textarea class="form-control" name="notes" rows="4"></textarea>
        <button class="btn btn-success btn-lg w-100 mt-4">Submit Checklist</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
